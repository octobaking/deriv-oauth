<!DOCTYPE html>
<html>
<head>
    <title>Deriv Login</title>
</head>
<body>
    <h2>Deriv OAuth Login</h2>
    <button onclick="startLogin()">Login with Deriv</button>
    <pre id="log"></pre>

    <script>
        function generatePKCE() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let verifier = '';
            for (let i = 0; i < 64; i++) {
                verifier += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // Simple SHA-256
            async function sha256(msg) {
                const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
                return btoa(String.fromCharCode(...new Uint8Array(buf)))
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_')
                    .replace(/=+$/, '');
            }
            
            sha256(verifier).then(challenge => {
                const state = Math.random().toString(36).substring(2);
                sessionStorage.setItem('deriv_code_verifier', verifier);
                sessionStorage.setItem('deriv_state', state);
                
                const clientId = '33N3kTh7JPwS7pJ7xkNkR';
                const redirectUri = 'https://deriv-oauth-y1s5.vercel.app/callback';
                
                const url = 'https://auth.deriv.com/oauth2/auth?' +
                    'response_type=code' +
                    '&client_id=' + clientId +
                    '&redirect_uri=' + encodeURIComponent(redirectUri) +
                    '&scope=trade' +
                    '&state=' + state +
                    '&code_challenge=' + challenge +
                    '&code_challenge_method=S256';
                
                document.getElementById('log').textContent = 'Redirecting to Deriv...';
                window.location.href = url;
            });
        }
    </script>
</body>
</html>
